<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E0E7FF"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Open book -->
  <g transform="translate(256, 280)">
    <!-- Left page -->
    <path d="M-10,-100 Q-10,-110 -20,-110 L-120,-110 Q-140,-110 -140,-90 L-140,60 Q-140,80 -120,80 L-10,80 Z" fill="url(#book)" opacity="0.95"/>
    <!-- Right page -->
    <path d="M10,-100 Q10,-110 20,-110 L120,-110 Q140,-110 140,-90 L140,60 Q140,80 120,80 L10,80 Z" fill="url(#book)" opacity="0.95"/>
    <!-- Book spine -->
    <path d="M-10,-100 Q0,-120 10,-100 L10,80 Q0,90 -10,80 Z" fill="#C7D2FE" opacity="0.8"/>
    <!-- Text lines on left page -->
    <line x1="-120" y1="-70" x2="-30" y2="-70" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="-120" y1="-45" x2="-50" y2="-45" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <line x1="-120" y1="-20" x2="-40" y2="-20" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <line x1="-120" y1="5" x2="-55" y2="5" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <!-- Text lines on right page -->
    <line x1="30" y1="-70" x2="120" y2="-70" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="30" y1="-45" x2="100" y2="-45" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <line x1="30" y1="-20" x2="110" y2="-20" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <line x1="30" y1="5" x2="95" y2="5" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- Speech bubble with "A" -->
  <g transform="translate(340, 130)">
    <ellipse cx="0" cy="0" rx="65" ry="50" fill="white" opacity="0.95"/>
    <path d="M-20,45 L-5,30 L10,45 Z" fill="white" opacity="0.95"/>
    <text x="0" y="15" text-anchor="middle" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="#4F46E5">A</text>
  </g>
  <!-- Headphone icon (listening) -->
  <g transform="translate(150, 120)">
    <path d="M-35,15 A45,45 0 0 1 35,15" stroke="white" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.9"/>
    <rect x="-45" y="10" width="16" height="30" rx="5" fill="white" opacity="0.9"/>
    <rect x="29" y="10" width="16" height="30" rx="5" fill="white" opacity="0.9"/>
  </g>
</svg>
